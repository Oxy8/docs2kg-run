openai:
  api_key: "mock_key"
  api_base: "https://api.openai.com/v1"
  temperature: 0.7
  max_tokens: 2000
  timeout: 30
  max_retries: 2

ollama:
  api_base: "http://localhost:11434"
  timeout: 30
  max_retries: 2
  temperature: 0.7
  context_window: 4096
  format: "json"
  stream: false

huggingface:
  api_token: "mock_token"
  api_base: "https://api-inference.huggingface.co/models"
  timeout: 30

llamacpp:
  context_length: 4096
  num_threads: 1
  gpu_layers: 0
  max_tokens: 2000
  top_p: 0.9
  stop_tokens: ["\n", "\n\n", "\n\n\n"]
  temperature: 0.7
  model_path: "models/llama-7b.gguf"

data:
  input_dir: "data/input"
  output_dir: "data/output"
  ontology_dir: "data/ontology"

semantic_kg:
  entity_list: "data/ontology/entity_list.csv"
  relation_list: "data/ontology/relation_list.csv"
  ontology: "data/ontology/ontology.json"
  domain_description: "data/ontology/domain_description.txt"
